server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/json
        application/rss+xml
        image/svg+xml;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Auth micro-frontend
    location /auth/ {
        alias /usr/share/nginx/html/auth/;
        try_files $uri $uri/ /auth/index.html;

        # Cache content-hashed assets indefinitely
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Index Studio micro-frontend
    location /index-studio/ {
        alias /usr/share/nginx/html/index-studio/;
        try_files $uri $uri/ /index-studio/index.html;

        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Host shell app — SPA catch-all (must be last)
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # Cache content-hashed assets indefinitely
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Never cache the HTML entry point
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        try_files $uri $uri/ /index.html;
    }
}
